# ──────────────────────────────────────────────────────────
# AI Control Plane — Kubernetes Deployment & Scaling Config
# Task: DEP-05
# ──────────────────────────────────────────────────────────
# Apply:
#   kubectl apply -f deploy/scaling.yaml
# ──────────────────────────────────────────────────────────

apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-control-plane
  labels:
    app: ai-control-plane
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-control-plane
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: ai-control-plane
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: control-plane
          image: ai-control-plane:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
              protocol: TCP
          env:
            - name: ENVIRONMENT
              value: "production"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: ai-control-plane-secrets
                  key: database-url
            - name: CLAUDE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ai-control-plane-secrets
                  key: claude-api-key
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: ai-control-plane-secrets
                  key: jwt-secret-key
            - name: LOG_LEVEL
              value: "INFO"
            - name: METRICS_ENABLED
              value: "true"
            - name: API_HOST
              value: "0.0.0.0"
            - name: API_PORT
              value: "8000"
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
      terminationGracePeriodSeconds: 30

---
apiVersion: v1
kind: Service
metadata:
  name: ai-control-plane
  labels:
    app: ai-control-plane
spec:
  type: ClusterIP
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
      name: http
  selector:
    app: ai-control-plane

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ai-control-plane-hpa
  labels:
    app: ai-control-plane
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ai-control-plane
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
